<svg id="Capa_1" data-name="Capa 1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 278 233"><defs><style>.cls-1{fill:#f58448;}.cls-2{fill:#e7c327;}.cls-3{fill:#ec9a4e;}.cls-4,.cls-6{fill:none;stroke-linecap:round;stroke-width:2px;}.cls-4{stroke:#bf2a61;stroke-linejoin:round;stroke-dasharray:5 5;}.cls-5{fill:#bf2a61;}.cls-6{stroke:#cdcdcd;stroke-miterlimit:10;stroke-dasharray:4 5;}.cls-7{fill:#b09061;}.cls-8{fill:#827f33;}.cls-9{font-size:12px;font-family:OpenSans-Bold, Open Sans;font-weight:700;}.cls-10,.cls-9{fill:#fff;}.cls-10{font-size:5px;font-family:OpenSans, Open Sans;}</style></defs><rect class="cls-1" x="5.5" y="2" width="42" height="51"/><rect class="cls-2" x="37.5" y="64" width="55" height="44"/><rect class="cls-3" x="112.5" y="36" width="55" height="50"/><path class="cls-4" d="M66,231.44c-3.76-9.24-5.22-17.78-5.22-28.37a79.32,79.32,0,1,1,158.64,0,77.09,77.09,0,0,1-5.72,29.57"/><path class="cls-5" d="M214.93,203.14A74.88,74.88,0,1,0,71.37,233H208.73A74.69,74.69,0,0,0,214.93,203.14Z"/><polyline class="cls-6" points="49.57 188.46 26.13 188.46 26.13 61.05"/><path class="cls-1" d="M26.13,60.19a2.39,2.39,0,1,1,2.39-2.39A2.39,2.39,0,0,1,26.13,60.19Z"/><path class="cls-5" d="M55,190.85a2.39,2.39,0,1,1,2.39-2.39A2.39,2.39,0,0,1,55,190.85Z"/><polyline class="cls-6" points="77.01 143.14 64.92 143.14 64.92 113.56"/><path class="cls-2" d="M64.92,114.84a2.39,2.39,0,1,1,2.39-2.39A2.39,2.39,0,0,1,64.92,114.84Z"/><path class="cls-5" d="M77.11,145.53a2.39,2.39,0,1,1,2.39-2.39A2.39,2.39,0,0,1,77.11,145.53Z"/><line class="cls-6" x1="140.21" y1="97.33" x2="140.21" y2="112.9"/><path class="cls-3" d="M140.21,94a2.39,2.39,0,1,1,2.39-2.39A2.39,2.39,0,0,1,140.21,94Z"/><path class="cls-5" d="M140.05,121.2a2.36,2.36,0,1,1,2.35-2.36A2.36,2.36,0,0,1,140.05,121.2Z"/><polyline class="cls-6" points="202.54 143.14 214.63 143.14 214.63 113.56"/><path class="cls-7" d="M214.63,114.88a2.39,2.39,0,1,0-2.39-2.39A2.39,2.39,0,0,0,214.63,114.88Z"/><path class="cls-5" d="M203,145.53a2.39,2.39,0,1,0-2.39-2.39A2.39,2.39,0,0,0,203,145.53Z"/><polyline class="cls-6" points="231.06 188.66 254.51 188.66 254.51 61.24"/><path class="cls-8" d="M254.51,59.8a2.39,2.39,0,1,0-2.39-2.39A2.39,2.39,0,0,0,254.51,59.8Z"/><path class="cls-5" d="M226.18,191.05a2.39,2.39,0,1,0-2.39-2.39A2.39,2.39,0,0,0,226.18,191.05Z"/><text class="cls-9" transform="translate(95.56 186.64)">Características<tspan x="14.28" y="14.4">de la Ética</tspan></text><text class="cls-10" transform="translate(14.74 23.27)">Su objeto<tspan x="-4.01" y="6">son los actos</tspan><tspan x="-0.66" y="12">humanos.</tspan></text><rect class="cls-8" x="233.5" y="2" width="42" height="51"/><text class="cls-10" transform="translate(236.93 10.27)">La ética es una <tspan x="6.29" y="6">disciplina </tspan><tspan x="4.64" y="12">normativa, </tspan><tspan x="0.21" y="18" xml:space="preserve">define  normas</tspan><tspan x="3.79" y="24" xml:space="preserve"> o reglas de </tspan><tspan x="2.74" y="30">conducta &quot;el </tspan><tspan x="5.02" y="36">deber ser&quot;.</tspan></text><text class="cls-10" transform="translate(42.73 75.27)">Se fundamenta en <tspan x="2.26" y="6">la diferenciacion </tspan><tspan x="1.87" y="12">entre bien y mal, </tspan><tspan x="1.97" y="18">entre lo correcto </tspan><tspan x="4.13" y="24">y lo incorrecto. </tspan></text><text class="cls-10" transform="translate(123.36 48.27)">Las desiciones <tspan x="6.88" y="6">implican </tspan><tspan x="-2.52" y="12">responsabilidad, </tspan><tspan x="-3.07" y="18">debiendo asumir </tspan><tspan x="-4.01" y="24">las consecuencias </tspan><tspan x="-3.93" y="30">de nuestros actos.</tspan></text><rect class="cls-7" x="187.5" y="58" width="55" height="50"/><text class="cls-10" transform="translate(194.36 70.27)">Dado que somos <tspan x="5.85" y="6">imperfectos,</tspan><tspan x="6.36" y="12">el objeto es </tspan><tspan x="3.84" y="18">acercarse a la </tspan><tspan x="7.48" y="24">perfección.</tspan></text></svg>